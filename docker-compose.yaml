services:
  mongodb:
    build: ./mongodb
    image: mongodb:v1
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: catalogue:v1
    container_name: catalogue
    depends_on: 
      - mongodb 
  frontend:
    build: ./frontend
    image: frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on: 
      - catalogue
      - user
      - cart 
      - shipping
      - payment

  redis:
    image: redis 
    container_name: redis 

  user:
    build: ./user
    image: user:v1
    container_name: user
    depends_on: 
      - redis
      - mongodb 

  cart:
    build: ./cart
    image: cart:v1
    container_name: cart
    depends_on: 
      - redis
      - catalogue
  
  mysql:
    build: ./mysql
    image: mysql:v1
    container_name: mysql 
    
  shipping:
    build: ./shipping
    image: shipping:v1
    container_name: shipping
    depends_on: 
      - mysql
      - cart

  rabbitmq:
    image: rabbitmq 
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123

  payment: 
    build: ./payment 
    image: payment:v1
    container_name: payment 
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
      - rabbitmq 


networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually